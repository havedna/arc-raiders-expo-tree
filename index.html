<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Raiders — Expedition Skill Tree</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050505;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
    font-family: var(--font-sans);
  }
  .wrap {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 16px;
    padding: 24px 16px 32px;
    width: 100%;
    max-width: 720px;
  }
  .hdr {
    text-align: center;
    color: #c8a84b;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .sub { text-align: center; color: #555; font-size: 11px; margin-bottom: 8px; }
  .pts-bar { text-align: center; margin-bottom: 10px; }
  .pts {
    display: inline-block;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 5px 20px;
    font-size: 12px;
    color: #c8a84b;
  }
  .btn-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .btn {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #1a1a1a; color: #aaa; border-color: #555; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-danger:hover { border-color: #f09595; color: #f09595; }
  .trees {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }
  .tcol { display: flex; flex-direction: column; align-items: center; }
  .tname {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
    padding: 4px 6px;
    border-radius: 4px;
    width: 100%;
    line-height: 1.4;
  }
  .nwrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }
  .node {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, border-color 0.2s;
    border: 2px solid;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .node i { font-size: 20px; transition: color 0.2s; }
  .node.locked { background: #111 !important; border-color: #2a2a2a !important; cursor: not-allowed; }
  .node.locked i { color: #333 !important; }
  .node:not(.locked):hover { transform: scale(1.08); }
  .conn { width: 2px; height: 20px; margin: 0 auto; transition: background 0.2s; }
  .slabel {
    font-size: 9px;
    text-align: center;
    margin-top: 5px;
    margin-bottom: 2px;
    max-width: 72px;
    line-height: 1.3;
    transition: color 0.2s;
  }

  /* Tooltip — smart positioning handled by JS */
  .tooltip {
    position: fixed;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 14px;
    width: 210px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    text-align: left;
    display: none;
  }
  .tooltip.show { opacity: 1; display: block; }
  .tt-name { font-size: 12px; font-weight: 500; margin-bottom: 5px; }
  .tt-desc { font-size: 11px; color: #777; line-height: 1.5; }
  .tt-status { font-size: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a; }

  .capwrap { display: flex; flex-direction: column; align-items: center; margin-top: 4px; }
  .capline { width: 2px; height: 20px; background: #c8a84b; opacity: 0.3; }
  .caplabel {
    font-size: 9px;
    color: #c8a84b;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 10px 0 14px;
    text-align: center;
  }
  .caprow { display: flex; gap: 24px; align-items: flex-start; justify-content: center; }
  .capopt { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .capnode {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #2a2a2a;
    background: #111;
    transition: transform 0.15s, border-color 0.2s, background 0.2s;
    cursor: not-allowed;
    -webkit-tap-highlight-color: transparent;
  }
  .capnode i { font-size: 24px; color: #333; transition: color 0.2s; }
  .capnode.available { border-color: #c8a84b; background: #1a1500; cursor: pointer; }
  .capnode.available i { color: #c8a84b; }
  .capnode.available:hover { transform: scale(1.08); }
  .capnode.chosen { border-color: #c8a84b; background: #2a1f00; cursor: default; }
  .capnode.chosen i { color: #c8a84b; }
  .capdivider { font-size: 12px; color: #444; align-self: center; margin-top: 20px; }
  .cap-namelabel { font-size: 10px; text-align: center; max-width: 70px; line-height: 1.3; color: #444; transition: color 0.2s; }
  .cap-namelabel.available { color: #c8a84b; }
  .cap-namelabel.chosen { color: #c8a84b; }

  .note { text-align: center; font-size: 10px; color: #444; margin-top: 12px; }
  .checkmark {
    position: absolute;
    top: -3px; right: -3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    border: 1px solid #2a2a2a;
    background: transparent;
  }
  .footer { text-align: center; margin-top: 24px; font-size: 10px; color: #2a2a2a; letter-spacing: 1px; }

  @media (max-width: 480px) {
    .node { width: 44px; height: 44px; }
    .node i { font-size: 16px; }
    .capnode { width: 52px; height: 52px; }
    .capnode i { font-size: 20px; }
    .tname { font-size: 8px; }
    .slabel { font-size: 8px; max-width: 56px; }
    .trees { gap: 4px; }
  }
</style>
</head>
<body>

<!-- Single shared tooltip -->
<div class="tooltip" id="shared-tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-desc" id="tt-desc"></div>
  <div class="tt-status" id="tt-status"></div>
</div>

<div class="wrap" id="main-wrap">
  <div class="hdr">Expedition skill tree</div>
  <div class="sub">Unlock 9 skills to access the capstone — 10th point chooses your path</div>
  <div class="pts-bar"><span class="pts" id="pts-display">0 / 13 points spent</span></div>
  <div class="btn-row">
    <button class="btn" id="undo-btn" onclick="undo()" disabled>
      <i class="ti ti-arrow-back-up"></i> Undo
    </button>
    <button class="btn btn-danger" id="reset-btn" onclick="resetAll()" disabled>
      <i class="ti ti-refresh"></i> Reset
    </button>
  </div>
  <div class="trees" id="tree-grid"></div>
  <div class="capwrap">
    <div class="capline"></div>
    <div class="caplabel">Veteran's Choice — requires 9 skills</div>
    <div class="caprow">
      <div class="capopt">
        <div class="capnode" id="capnode-a">
          <i class="ti ti-parachute"></i>
        </div>
        <div class="cap-namelabel" id="caplabel-a">Plan Ahead</div>
      </div>
      <div class="capdivider">or</div>
      <div class="capopt">
        <div class="capnode" id="capnode-b">
          <i class="ti ti-tools"></i>
        </div>
        <div class="cap-namelabel" id="caplabel-b">Self Sufficient</div>
      </div>
    </div>
    <div class="note" id="cap-note">Capstone choice locks until next expedition reset — other option available next expo</div>
  </div>
  <div class="footer">Arc Raiders — Fan Concept by DnA</div>
</div>

<script>
const TREES=[
  {name:"Scavenger's Instinct",color:"#378ADD",bg:"#042C5318",dark:"#042C53",skills:[
    {id:"s1",name:"Market Sense",icon:"ti-coin",desc:"See the coin value of any item while topside. No more guessing what's worth the carry weight."},
    {id:"s2",name:"Full Appraisal",icon:"ti-file-search",desc:"See the full base recycle value topside — not just salvage output. Make informed carry decisions on the spot."},
    {id:"s3",name:"Salvage Efficiency",icon:"ti-recycle",desc:"50% chance to yield 75% materials when salvaging topside instead of the base 50%. Also corrects material type on certain items."}
  ]},
  {name:"Tactical Mind",color:"#AFA9EC",bg:"#26215C18",dark:"#1a1740",skills:[
    {id:"t1",name:"Tactical Light",icon:"ti-antenna",desc:"Hold F to open a sub-radial menu. Deploy colored light sticks — 2 charges each color, outside inventory slots. Mark areas for squad coordination."},
    {id:"t2",name:"Dead Reckoning",icon:"ti-map-2",desc:"Downed players gain read-only map access. No pinging — just visibility. Stay useful to your squad while waiting for a revive."},
    {id:"t3",name:"Presence Pulse",icon:"ti-radar",desc:"2 charges per raid via Q dial. Reveals total active player count on the map. No locations — just a number to inform your extraction decision."}
  ]},
  {name:"Street Credit",color:"#EF9F27",bg:"#41240218",dark:"#2a1800",skills:[
    {id:"c1",name:"Familiar Face",icon:"ti-user-check",desc:"10% discount across all standard merchants — Tian Wen, Lance, Apollo, Celeste, Shani. Does not apply to Ermal."},
    {id:"c2",name:"Set Aside",icon:"ti-package",desc:"Common and uncommon limited stock items get +1 quantity in merchant rotations. Epic and legendary stock unchanged."},
    {id:"c3",name:"Under the Counter",icon:"ti-briefcase",desc:"Each merchant gains one exclusive veteran slot on a 5-day reset. Legendary weapon, Mk3 augment, Wolfpack, rare materials, map-specific keys."}
  ]},
  {name:"Practiced Hands",color:"#F09595",bg:"#50131318",dark:"#2d0a0a",skills:[
    {id:"k1",name:"Done This Before",icon:"ti-key",desc:"30% chance a key is returned to your inventory after use. Common and uncommon keys only."},
    {id:"k2",name:"Worth a Shot",icon:"ti-lock-open",desc:"7% chance to pick a lock without a key. Long animation, makes noise. One attempt per lock per raid — fail and it's flagged for everyone."},
    {id:"k3",name:"Tool of the Trade",icon:"ti-keyframe",desc:"Craft a unique Key Ring at your level 3 bench. Holds 3 keys of any type in one slot. Lootable topside, recraftable in base. One per player at any time."}
  ]}
];

const CAP_DATA={
  a:{name:"Plan Ahead",desc:"Pre-pack a weight-capped consumables-only supply cache in base. Call it in once per raid via Q dial. A unique colored flare signals your position to all players."},
  b:{name:"Self Sufficient",desc:"Unlocks key crafting recipes at your workbench. Craft common and uncommon map keys in base using topside materials. Rare keys remain loot only."}
};

let unlocked=new Set();
let capChosen=null;
let history=[];
let activeTooltipId=null;

const tooltip=document.getElementById('shared-tooltip');
const ttName=document.getElementById('tt-name');
const ttDesc=document.getElementById('tt-desc');
const ttStatus=document.getElementById('tt-status');

function showTooltip(el, name, desc, status, color){
  ttName.textContent=name;
  ttName.style.color=color||'#c8a84b';
  ttDesc.textContent=desc;
  ttStatus.textContent=status;
  ttStatus.style.color='#666';
  tooltip.classList.add('show');
  positionTooltip(el);
  activeTooltipId=el.id||name;
}

function positionTooltip(el){
  const rect=el.getBoundingClientRect();
  const tw=210;
  const th=tooltip.offsetHeight||120;
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  const margin=8;

  let left=rect.left+rect.width/2-tw/2;
  let top=rect.top-th-10;

  if(left<margin) left=margin;
  if(left+tw>vw-margin) left=vw-tw-margin;
  if(top<margin) top=rect.bottom+10;
  if(top+th>vh-margin) top=vh-th-margin;

  tooltip.style.left=left+'px';
  tooltip.style.top=top+'px';
  tooltip.style.width=tw+'px';
}

function hideTooltip(){
  tooltip.classList.remove('show');
  activeTooltipId=null;
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.node')&&!e.target.closest('.capnode')){
    hideTooltip();
  }
});

function saveHistory(){
  history.push({unlocked:new Set(unlocked),capChosen});
  if(history.length>50) history.shift();
  updateBtns();
}

function undo(){
  if(!history.length) return;
  const prev=history.pop();
  unlocked=new Set(prev.unlocked);
  capChosen=prev.capChosen;
  hideTooltip();
  updateBtns();
  render();
}

function resetAll(){
  if(!unlocked.size&&!capChosen) return;
  saveHistory();
  unlocked=new Set();
  capChosen=null;
  hideTooltip();
  render();
}

function updateBtns(){
  document.getElementById('undo-btn').disabled=history.length===0;
  document.getElementById('reset-btn').disabled=unlocked.size===0&&!capChosen;
}

function totalSkills(){return unlocked.size}

function treeUnlocked(ti,si){
  for(let i=0;i<si;i++) if(!unlocked.has(TREES[ti].skills[i].id)) return false;
  return true;
}

function canUnlock(ti,si){
  if(unlocked.has(TREES[ti].skills[si].id)) return false;
  return treeUnlocked(ti,si);
}

function getStatus(ti,si){
  const isU=unlocked.has(TREES[ti].skills[si].id);
  const canU=canUnlock(ti,si);
  if(isU) return 'Tap to relock';
  if(canU) return 'Tap to unlock';
  return 'Unlock previous skill first';
}

function toggleSkill(e,ti,si){
  e.stopPropagation();
  const skill=TREES[ti].skills[si];
  const node=document.getElementById('node-'+skill.id);
  const isU=unlocked.has(skill.id);
  const canU=canUnlock(ti,si);

  if(!isU&&!canU){
    showTooltip(node,skill.name,skill.desc,'Unlock previous skill first',TREES[ti].color);
    return;
  }

  saveHistory();
  if(isU){
    for(let i=si;i<TREES[ti].skills.length;i++) unlocked.delete(TREES[ti].skills[i].id);
    if(totalSkills()<9) capChosen=null;
  } else {
    unlocked.add(skill.id);
  }
  render();
  showTooltip(node,skill.name,skill.desc,getStatus(ti,si),TREES[ti].color);
}

function tapSkillInfo(e,ti,si){
  e.stopPropagation();
  const skill=TREES[ti].skills[si];
  const node=document.getElementById('node-'+skill.id);
  if(activeTooltipId===('node-'+skill.id)){
    hideTooltip();
    return;
  }
  showTooltip(node,skill.name,skill.desc,getStatus(ti,si),TREES[ti].color);
}

function chooseCapstone(e,opt){
  e.stopPropagation();
  const node=document.getElementById('capnode-'+opt);
  if(totalSkills()<9){
    showTooltip(node,CAP_DATA[opt].name,CAP_DATA[opt].desc,'Spend 9 skill points first','#c8a84b');
    return;
  }
  if(capChosen!==null){
    showTooltip(node,CAP_DATA[opt].name,CAP_DATA[opt].desc,capChosen===opt?'Chosen for this expedition':'Already chose for this expedition','#c8a84b');
    return;
  }
  saveHistory();
  capChosen=opt;
  render();
  showTooltip(node,CAP_DATA[opt].name,CAP_DATA[opt].desc,'Chosen for this expedition','#c8a84b');
}

function render(){
  const pts=totalSkills()+(capChosen?1:0);
  document.getElementById('pts-display').textContent=pts+' / 13 points spent';
  updateBtns();

  TREES.forEach((tree,ti)=>{
    tree.skills.forEach((skill,si)=>{
      const node=document.getElementById('node-'+skill.id);
      const conn=document.getElementById('conn-'+skill.id);
      const lbl=document.getElementById('lbl-'+skill.id);
      const chk=document.getElementById('chk-'+skill.id);
      const isU=unlocked.has(skill.id);
      const canU=canUnlock(ti,si);

      if(isU){
        node.style.background=tree.dark;
        node.style.borderColor=tree.color;
        node.querySelector('i').style.color=tree.color;
        node.classList.remove('locked');
        lbl.style.color=tree.color;
        if(chk){chk.style.background=tree.color;chk.style.borderColor=tree.color;chk.innerHTML='<i class="ti ti-check" style="font-size:9px;color:#000"></i>';}
        if(conn){conn.style.background=tree.color;conn.style.opacity='0.6';}
      } else if(canU){
        node.style.background='#1a1a1a';
        node.style.borderColor=tree.color+'88';
        node.querySelector('i').style.color=tree.color+'88';
        node.classList.remove('locked');
        lbl.style.color='#555';
        if(chk){chk.style.background='transparent';chk.style.borderColor='#2a2a2a';chk.innerHTML='';}
        if(conn){conn.style.background='#333';conn.style.opacity='1';}
      } else {
        node.style.background='#111';
        node.style.borderColor='#2a2a2a';
        node.querySelector('i').style.color='#333';
        node.classList.add('locked');
        lbl.style.color='#333';
        if(chk){chk.style.background='transparent';chk.style.borderColor='#2a2a2a';chk.innerHTML='';}
        if(conn){conn.style.background='#222';conn.style.opacity='1';}
      }
    });
  });

  const allDone=totalSkills()>=9;
  ['a','b'].forEach(opt=>{
    const cn=document.getElementById('capnode-'+opt);
    const cl=document.getElementById('caplabel-'+opt);
    const cs=document.getElementById('capstatus-'+opt);
    if(capChosen===opt){
      cn.className='capnode chosen';
      cl.className='cap-namelabel chosen';
    } else if(capChosen!==null){
      cn.className='capnode';
      cn.querySelector('i').style.color='#333';
      cl.className='cap-namelabel';
    } else if(allDone){
      cn.className='capnode available';
      cl.className='cap-namelabel available';
    } else {
      cn.className='capnode';
      cn.querySelector('i').style.color='#333';
      cl.className='cap-namelabel';
    }
  });

  const remaining=Math.max(0,9-totalSkills());
  document.getElementById('cap-note').textContent=
    capChosen
      ? 'Locked until next expedition reset — other option available next expo'
      : allDone
        ? 'Choose your path — locks until next expedition reset'
        : remaining+' more skill'+(remaining===1?'':'s')+' needed to unlock capstone';
}

const grid=document.getElementById('tree-grid');
TREES.forEach((tree,ti)=>{
  const col=document.createElement('div');
  col.className='tcol';
  col.innerHTML=`<div class="tname" style="color:${tree.color};background:${tree.bg}">${tree.name}</div>`;
  tree.skills.forEach((skill,si)=>{
    const nwrap=document.createElement('div');
    nwrap.className='nwrap';
    nwrap.innerHTML=`
      <div class="node locked" id="node-${skill.id}" aria-label="${skill.name}">
        <i class="ti ${skill.icon}"></i>
        <div class="checkmark" id="chk-${skill.id}"></div>
      </div>
      <div class="slabel" id="lbl-${skill.id}" style="color:#333">${skill.name}</div>
    `;
    col.appendChild(nwrap);

    const node=nwrap.querySelector('.node');
    let pressTimer=null;

    node.addEventListener('click',function(e){
      toggleSkill(e,ti,si);
    });

    node.addEventListener('contextmenu',function(e){
      e.preventDefault();
      tapSkillInfo(e,ti,si);
    });

    if(si<2){
      const conn=document.createElement('div');
      conn.className='conn';
      conn.id='conn-'+skill.id;
      conn.style.background='#222';
      col.appendChild(conn);
    }
  });
  grid.appendChild(col);
});

document.getElementById('capnode-a').addEventListener('click',function(e){chooseCapstone(e,'a')});
document.getElementById('capnode-b').addEventListener('click',function(e){chooseCapstone(e,'b')});

window.addEventListener('resize',function(){
  if(tooltip.classList.contains('show')&&activeTooltipId){
    const el=document.querySelector('[id="'+activeTooltipId+'"]');
    if(el) positionTooltip(el);
  }
});

render();
</script>
</body>
</html>
